<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- 页面元信息 -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI 文本检测系统 - 用户安全注册入口" />
  <title>注册 - AI 文本检测系统</title>

  <!-- 样式资源 -->
  <!-- 【安全说明】生产环境建议配合 CSP (Content-Security-Policy) 限制 style-src 加载源 -->
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <!-- 背景装饰元素 (纯视觉，对屏幕阅读器隐藏) -->
  <div class="bg-shape bg-one" aria-hidden="true"></div>
  <div class="bg-shape bg-two" aria-hidden="true"></div>

  <!-- 主内容区域 -->
  <main class="auth-wrap" role="main">
    <section class="card auth-box" aria-labelledby="authTitle">
      <h1 id="authTitle" class="auth-title">用户注册</h1>
      <p class="muted auth-subtitle">注册成功后返回登录页面</p>

      <!--
        【安全与规范说明】
        1. 使用 <form> 标签包裹以支持浏览器密码管理器的自动填充和回车键提交。
        2. 添加 novalidate 属性禁用浏览器默认校验 UI，由前端 JS 统一处理校验逻辑与错误提示。
        3. JS 中必须监听 submit 事件并调用 e.preventDefault() 以防止页面刷新。
      -->
      <form id="registerForm" class="auth-form" novalidate>

        <!-- 用户名输入区 -->
        <label for="username">用户名</label>
        <input
          id="username"
          name="username"
          type="text"
          placeholder="3-50 字符"
          autocomplete="username"
          minlength="3"
          maxlength="50"
          required
        />

        <!-- 密码输入区 -->
        <label for="password">密码</label>
        <div class="password-input-wrap">
          <input
            id="password"
            name="password"
            type="password"
            placeholder="至少 6 位"
            autocomplete="new-password"
            minlength="6"
            required
          />
          <!-- 密码可见性切换按钮 -->
          <button
            id="togglePasswordBtn"
            type="button"
            class="password-eye"
            aria-label="显示或隐藏密码"
            aria-pressed="false"
            title="显示/隐藏密码"
          ></button>
        </div>

        <!-- 确认密码输入区 -->
        <label for="passwordConfirm">确认密码</label>
        <div class="password-input-wrap">
          <input
            id="passwordConfirm"
            name="passwordConfirm"
            type="password"
            placeholder="请再次输入密码"
            autocomplete="new-password"
            minlength="6"
            required
          />
          <!-- 确认密码可见性切换按钮 -->
          <button
            id="togglePasswordConfirmBtn"
            type="button"
            class="password-eye"
            aria-label="显示或隐藏确认密码"
            aria-pressed="false"
            title="显示/隐藏确认密码"
          ></button>
        </div>

        <!-- 操作按钮区 -->
        <button id="registerBtn" type="submit" class="primary big">注册</button>
        <button id="goLoginBtn" type="button" class="ghost big">已有账号？去登录</button>

        <!-- 消息提示区 -->
        <!-- 【安全检测注释】前端渲染此消息时，必须使用 textContent 而非 innerHTML，以防止存储型/反射型 XSS 攻击 -->
        <!-- 【安全检测注释】生产环境必须强制使用 HTTPS 传输，防止新注册的凭证在传输层被中间人(MITM)嗅探 -->
        <p id="msg" class="msg" role="alert" aria-live="assertive"></p>

      </form>
    </section>
  </main>

  <!-- 脚本资源 -->
  <!-- 【安全检测注释】
    1. 建议在生产环境通过 HTTP 响应头配置 Content-Security-Policy (CSP)，严格限制 script-src。
    2. 若部署在 CDN 或子路径，建议为脚本添加 integrity (SRI) 属性以防止供应链篡改。
    3. 【缓存控制】保留 URL 中的版本号查询参数 (?v=...)，确保安全补丁和逻辑修复能及时推送到客户端，避免缓存投毒或旧版漏洞残留。
  -->
  <script src="/static/common.js?v=20260416-4"></script>
  <script src="/static/register.js?v=20260416-4"></script>
</body>
</html>
