<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 - AI 文本检测系统</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-shape bg-one"></div>
  <div class="bg-shape bg-two"></div>

  <main class="auth-wrap">
    <section class="card auth-box">
      <h1 class="auth-title">用户注册</h1>
      <p class="muted auth-subtitle">注册成功后返回登录页面</p>

      <label>用户名</label>
      <input id="username" type="text" placeholder="3-50 字符" />

      <label>密码</label>
      <div class="password-input-wrap">
        <input id="password" type="password" placeholder="至少 6 位" />
        <button id="togglePasswordBtn" type="button" class="password-eye" aria-label="显示或隐藏密码" title="显示/隐藏密码"></button>
      </div>

      <label>确认密码</label>
      <div class="password-input-wrap">
        <input id="passwordConfirm" type="password" placeholder="请再次输入密码" />
        <button id="togglePasswordConfirmBtn" type="button" class="password-eye" aria-label="显示或隐藏确认密码" title="显示/隐藏确认密码"></button>
      </div>

      <button id="registerBtn" class="primary big">注册</button>
      <button id="goLoginBtn" class="ghost big">已有账号？去登录</button>
      <p id="msg" class="msg"></p>
    </section>
  </main>

  <script src="/static/common.js?v=20260416-4"></script>
  <script src="/static/register.js?v=20260416-4"></script>
</body>
</html>
