<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- 页面元信息 -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI 文本检测系统 - 历史记录与详情查看" />
  <title>历史记录 - AI 文本检测系统</title>

  <!-- 样式资源 -->
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <!-- 背景装饰元素 (纯视觉) -->
  <div class="bg-shape bg-one" aria-hidden="true"></div>
  <div class="bg-shape bg-two" aria-hidden="true"></div>

  <!-- 顶部导航栏 -->
  <header class="topbar centered-topbar" role="banner">
    <h1>AI 文本检测系统</h1>

    <!-- 用户操作面板 -->
    <nav class="user-panel" aria-label="用户与导航操作">
      <span id="currentUser" class="muted" aria-label="当前登录用户"></span>
      <button id="goDetectBtn" class="ghost" type="button">返回文本检测</button>
      <button id="logoutBtn" class="ghost" type="button">退出登录</button>
    </nav>
  </header>

  <!-- 主内容区域 -->
  <main class="layout-single" role="main">
    <section class="card history-card-full" aria-label="历史记录主面板">
      <div id="historyShell" class="history-shell">

        <!-- 左侧：历史记录列表侧边栏 -->
        <aside id="historySidebar" class="history-sidebar" role="complementary" aria-label="历史记录列表">
          <div class="history-sidebar-head">
            <h2>查看历史记录</h2>
            <button id="clearHistoryBtn" class="ghost" type="button">清除历史记录</button>
          </div>
          <!-- 动态渲染的历史分组列表 -->
          <div id="historyList" class="history-groups" role="list" aria-live="polite"></div>
        </aside>

        <!-- 右侧：检测详情展示区 -->
        <section class="history-detail" aria-label="检测详情">
          <!-- 详情区顶部控制栏 -->
          <div class="history-detail-head">
            <button
              id="sidebarToggleBtn"
              class="ghost"
              type="button"
              aria-controls="historySidebar"
              aria-expanded="true"
            >
              收起边栏
            </button>
            <h3>具体检测详情</h3>

            <!-- 结果导出菜单 -->
            <div class="export-control-wrap export-control-wrap-right">
              <button id="exportHistoryBtn" class="ghost export-trigger" type="button" disabled>
                结果导出
              </button>
              <div id="exportHistoryMenu" class="export-menu hidden" aria-hidden="true">
                <div class="export-menu-panel" role="dialog" aria-modal="true" aria-label="历史记录导出格式选择">
                  <div class="export-menu-title">选择导出格式</div>
                  <button id="exportHistoryTxtBtn" class="export-menu-item" type="button">导出为 TXT</button>
                  <button id="exportHistoryJsonBtn" class="export-menu-item" type="button">导出为 JSON</button>
                </div>
              </div>
            </div>
          </div>

          <!-- 空状态提示 -->
          <div id="detailEmpty" class="muted" role="status">
            点击左侧任意历史缩略查看详情
          </div>

          <!-- 详情数据面板 (默认隐藏，动态加载时显示) -->
          <div id="detailPanel" class="hidden" aria-live="polite">
            <div id="detailTime" class="switch-info muted">时间：暂无</div>

            <h4>原始文本</h4>
            <div id="detailInput" class="highlight-box" role="textbox" aria-readonly="true">暂无结果</div>

            <h4>单词级高亮</h4>
            <div id="detailWords" class="highlight-box">暂无结果</div>

            <h4>句子级结果</h4>
            <div id="detailSentences" class="sentence-list" role="list"></div>
          </div>
        </section>

      </div>
    </section>
  </main>

  <!-- 脚本资源 -->
  <!-- 【安全与缓存控制】使用版本号查询参数防止浏览器缓存旧版脚本，确保加载最新安全补丁与功能逻辑 -->
  <script src="/static/common.js?v=20260417-3"></script>
  <script src="/static/history.js?v=20260417-3"></script>
</body>
</html>
